<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>아보카도 후숙 판단</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ["Pretendard", "-apple-system", "BlinkMacSystemFont", "Malgun Gothic", "sans-serif"],
          },
        },
      },
    };
  </script>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="min-h-screen bg-stone-50">
  <header class="flex items-center gap-2 px-5 pt-[max(env(safe-area-inset-top),1.25rem)] pb-2">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" aria-hidden="true">
      <path d="M12 3c3 3 6 6.5 6 11a6 6 0 11-12 0c0-4.5 3-8 6-11z" fill="#059669" opacity="0.9" />
      <circle cx="12" cy="14.5" r="2.6" fill="#5b3a22" />
    </svg>
    <h1 class="text-lg font-bold text-stone-900">아보카도 후숙 판단</h1>
  </header>

  <p id="welcomeBanner" class="hidden px-5 pt-1 text-sm font-semibold text-emerald-700"></p>

  <div id="loginGate" class="fixed inset-0 z-50 flex items-center justify-center bg-stone-50 px-6">
    <form id="loginForm" class="w-full max-w-xs rounded-3xl bg-white p-6 shadow-lg shadow-stone-900/5 ring-1 ring-stone-900/5">
      <h2 class="text-lg font-bold text-stone-900">로그인</h2>
      <p class="mt-1 text-sm text-stone-400">이메일을 입력해주세요</p>
      <input
        id="loginEmail"
        type="email"
        required
        placeholder="you@uni.edu"
        class="mt-4 w-full rounded-xl border border-stone-200 px-4 py-2.5 text-sm text-stone-900 outline-none focus:border-emerald-500"
      />
      <p id="loginError" class="mt-2 hidden text-xs text-red-500"></p>
      <button
        type="submit"
        class="mt-4 w-full rounded-xl bg-emerald-600 py-2.5 text-sm font-bold text-white active:bg-emerald-700"
      >
        시작하기
      </button>
    </form>
  </div>

  <main class="px-5 pb-10 max-w-md mx-auto">
    <label
      for="cameraInput"
      class="mt-3 flex w-full cursor-pointer flex-col items-center gap-3 rounded-3xl bg-gradient-to-b from-emerald-500 to-emerald-600 px-6 py-9 text-center shadow-lg shadow-emerald-600/25 active:from-emerald-600 active:to-emerald-700"
    >
      <span class="flex h-14 w-14 items-center justify-center rounded-full bg-white/15">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path
            d="M4 8a2 2 0 012-2h1.5l1-1.5h7l1 1.5H18a2 2 0 012 2v9a2 2 0 01-2 2H6a2 2 0 01-2-2V8z"
            stroke="#fff" stroke-width="1.8" stroke-linejoin="round"
          />
          <circle cx="12" cy="12.5" r="3.2" stroke="#fff" stroke-width="1.8" />
        </svg>
      </span>
      <span class="text-lg font-bold text-white">사진 찍기</span>
      <span class="text-sm text-emerald-50/90">아보카도를 촬영하고 바로 확인하세요</span>
    </label>
    <input
      id="cameraInput"
      type="file"
      accept="image/*"
      capture="environment"
      class="file-input-hidden"
    />

    <div class="mt-8 flex items-baseline justify-between">
      <h2 class="text-sm font-semibold text-stone-900">최근 판정 이력</h2>
      <span id="historyCount" class="text-xs text-stone-400 tabular-nums"></span>
    </div>

    <div id="historyEmpty" class="hidden mt-3 flex flex-col items-center rounded-2xl border border-dashed border-stone-300 px-6 py-10 text-center">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M12 3c3 3 6 6.5 6 11a6 6 0 11-12 0c0-4.5 3-8 6-11z" fill="#059669" opacity="0.9" />
        <circle cx="12" cy="14.5" r="2.6" fill="#5b3a22" />
      </svg>
      <p class="mt-3 text-sm font-medium text-stone-700">아직 촬영한 아보카도가 없어요</p>
      <p class="mt-1 text-sm text-stone-400">위 버튼으로 첫 판정을 시작해보세요</p>
    </div>

    <ul id="historyList" class="mt-3 flex flex-col gap-2.5"></ul>
  </main>

  <script src="app.js"></script>
  <script>
    const cameraInput = document.getElementById("cameraInput");
    const historyList = document.getElementById("historyList");
    const historyEmpty = document.getElementById("historyEmpty");
    const historyCount = document.getElementById("historyCount");

    const CHIP_CLASSES = {
      ready: "bg-emerald-50 text-emerald-700 ring-emerald-200",
      ripening: "bg-amber-50 text-amber-700 ring-amber-200",
    };

    function chipLabel(entry) {
      return entry.status === "ready" ? "지금 드세요" : `${entry.days}일 후숙 필요`;
    }

    function renderHistory() {
      const history = getHistory();
      historyList.innerHTML = "";

      if (history.length === 0) {
        historyEmpty.classList.remove("hidden");
        historyCount.textContent = "";
        return;
      }

      historyEmpty.classList.add("hidden");
      historyCount.textContent = `${history.length}개`;

      for (const entry of history) {
        const li = document.createElement("li");
        li.innerHTML = `
          <button
            type="button"
            data-id="${entry.id}"
            class="history-item flex w-full items-center gap-3 rounded-2xl bg-white p-3 text-left shadow-sm ring-1 ring-stone-900/5 active:bg-stone-50"
          >
            <img src="${entry.image}" alt="" class="h-14 w-14 shrink-0 rounded-xl object-cover bg-stone-100" />
            <div class="min-w-0 flex-1">
              <span class="inline-flex items-center rounded-full px-2.5 py-1 text-xs font-semibold ring-1 ${CHIP_CLASSES[entry.status]}">
                ${chipLabel(entry)}
              </span>
              <p class="mt-1.5 text-xs text-stone-400">${formatDate(entry.capturedAt)} · 신뢰도 ${entry.confidence}%</p>
            </div>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M9 5l7 7-7 7" stroke="#d6d3d1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
          </button>
        `;
        historyList.appendChild(li);
      }

      historyList.querySelectorAll(".history-item").forEach((btn) => {
        btn.addEventListener("click", () => {
          window.location.href = `result.html?id=${btn.dataset.id}`;
        });
      });
    }

    cameraInput.addEventListener("change", async (e) => {
      const file = e.target.files[0];
      if (!file) return;

      const dataUrl = await readFileAsDataURL(file);

      const formData = new FormData();
      formData.append("image", file);

      let result;
      try {
        const res = await fetch("/api/classify", { method: "POST", body: formData });
        result = await res.json();
        if (!res.ok) throw new Error(result.error || "classification failed");
      } catch (err) {
        alert("판정에 실패했습니다. 다시 시도해주세요.");
        return;
      }

      const { stage, confidence, status, days } = result;

      const entry = {
        id: `${Date.now()}`,
        image: dataUrl,
        capturedAt: new Date().toISOString(),
        status,
        days,
        confidence,
      };
      saveHistoryEntry(entry);
      window.location.href = `result.html?id=${entry.id}`;
    });

    renderHistory();

    const USER_KEY = "avocado_user";
    const loginGate = document.getElementById("loginGate");
    const loginForm = document.getElementById("loginForm");
    const loginEmail = document.getElementById("loginEmail");
    const loginError = document.getElementById("loginError");
    const welcomeBanner = document.getElementById("welcomeBanner");

    function showWelcome(user) {
      welcomeBanner.textContent = `환영합니다, ${user.name}님`;
      welcomeBanner.classList.remove("hidden");
      loginGate.classList.add("hidden");
    }

    const savedUser = JSON.parse(localStorage.getItem(USER_KEY) || "null");
    if (savedUser) {
      showWelcome(savedUser);
    }

    loginForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      loginError.classList.add("hidden");

      try {
        const res = await fetch("/api/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email: loginEmail.value }),
        });
        const data = await res.json();

        if (!res.ok) {
          loginError.textContent = data.error || "로그인에 실패했습니다";
          loginError.classList.remove("hidden");
          return;
        }

        localStorage.setItem(USER_KEY, JSON.stringify(data));
        showWelcome(data);
      } catch {
        loginError.textContent = "서버에 연결할 수 없습니다";
        loginError.classList.remove("hidden");
      }
    });
  </script>
</body>
</html>
